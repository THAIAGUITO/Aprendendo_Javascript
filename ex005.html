<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIMEIROS PASSOS COM DOM</title>
    <style>
        body{
            background: rgba(68, 125, 199);
            color: white;
            font: normal 16px Arial;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos DOM</h1>
    <p>Aqui vai o resultado</p>
    <P>Aprendendo a usar o <strong>DOM</strong> em javascript</P>
    <div class="mensagem">Clique em mim</div>
    <div class="teste">Clique em mim</div>

    <script>
        var corpo = window.document.body;
        var p1 = window.document.getElementsByTagName('p')[0]; // getElementsByTagName é mais antigo e menos flexível
        p1.style.color = 'blue';
        corpo.style.background = 'black';

        var d = window.document.getElementsByClassName('mensagem')[0]; // getElementsByClassName é mais antigo e menos flexível
        d.style.background = 'red';

        var e = window.document.querySelector('div.teste'); // querySelector é mais moderno e flexível
        e.style.background = 'green';
    </script>
</body>
</html>
