<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt("Qual é o seu nome?")
        var salario = Number.parseFloat(window.prompt("Qual é o seu salário?"))
        document.write(`Olá, <strong>${nome}</strong> Seu nome tem ${nome.length} letras</br>`)
        document.write(`Seu nome em Maiusculo é ${nome.toLocaleUpperCase()} </br>`)
        document.write(`Seu nome em Minusculo é ${nome.toLocaleLowerCase()} </br>`)
        document.write(`Seu salário no Brasil é ${salario.toLocaleString('pt-BR', {style: 'currency', currency: 'BR'})}`)
    </script>
</body>
</html>
