<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Populando ARRAYS</title>
    <link rel="stylesheet" href="Aula_populando_arrays_com_funcoes.css">
</head>

<body>
    <div class="valor">
        <label>Valor 1</label>
        <input type="text" id="valor1">
    </div>

    <div class="valor">
        <label>Valor 2</label>
        <input type="text" id="valor2">
    </div>

    <div class="valor">
        <label>Resultado</label>
        <input type="text" id="resultado">
    </div>

    <div class="operacoes">
        <button id="btn_somar">+</button>
        <button id="btn_subtrair">-</button>
        <button id="btn_multiplicar">*</button>
        <button id="btn_dividir">/</button>
    </div>

    <script src="Aula_populando_arrays_com_funcoes.js"></script>
</body>

</html>
