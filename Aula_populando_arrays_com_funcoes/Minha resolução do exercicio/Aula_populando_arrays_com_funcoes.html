<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Populando ARRAYS - MINHA RESOLUÇÃO</title>
    <link rel="stylesheet" href="Aula_populando_arrays_com_funcoes.css">
</head>

<body>
    <div class="texto_numero">Numero 1</div>
    <div class="caixa_grande">
        <div id="caixa" class="caixa">
            <input type="number" id="valor1">
        </div>
    </div>

    <div class="texto_numero">Numero 2</div>
    <div class="caixa_grande"> 
        <div id="caixa" class="caixa">
            <input type="number" id="valor2">
        </div>
    </div>

    <div class="botoes">
        <button id="btnDividir">/</button>
        <button id="btnMultiplicar">*</button>
        <button id="btnSomar">+</button>
        <button id="btnSubtrair">-</button>
    </div>

    <div class="texto_numero">Resultado</div>
    <div class="caixa_grande"> 
        <div id="resultado" class="caixa">
        </div>
    </div>

    <script src="Aula_populando_arrays_com_funcoes.js"></script>
</body>

</html>
