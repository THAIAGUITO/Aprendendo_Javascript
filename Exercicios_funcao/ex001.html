<!-- Neste exercício, trabalharemos com nossa primeira função em JavaScript. No código abaixo, criamos uma função chamada func. 
Essa forma de criar funções é chamada de declaração de função: a palavra-chave function seguida pelo nome da função e um par de parênteses. 
Depois, segue-se o código JavaScript envolvido por chaves. Observe que usamos a palavra-chave return para fazer com que a função retorne um valor — neste caso, uma string.
Quando criamos uma função em JavaScript, a instrução dentro das chaves só é executada quando a função é chamada. 
Você pode chamar uma função usando seu nome e um par de parênteses: func(). Abaixo, chamamos nossa função e atribuímos seu valor de retorno à variável result. 
Em seguida, exibimos o result no console. Para resolver este exercício, basta fazer com que a instrução console.log() exiba as palavras "hello world".-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        function func() {
            return 'hello world';
        };
        const result = func();
        console.log(result);
    </script>
</body>

</html>
